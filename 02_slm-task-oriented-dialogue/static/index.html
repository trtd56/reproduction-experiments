<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>レストラン音声予約デモ</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="topbar">
          <div>
            <h1>レストラン青葉 予約受付</h1>
            <p id="status">未接続</p>
          </div>
        </div>

        <div class="meter" aria-hidden="true">
          <span id="meterFill"></span>
        </div>

        <div class="controls">
          <button id="recordButton" type="button" disabled>Start listening</button>
        </div>

        <section class="reservation-state" aria-label="予約状態">
          <div class="state-item active" id="state-date">
            <span class="state-label">日にち</span>
            <strong class="state-value">未確認</strong>
          </div>
          <div class="state-item" id="state-time">
            <span class="state-label">時間</span>
            <strong class="state-value">未確認</strong>
          </div>
          <div class="state-item" id="state-party-size">
            <span class="state-label">人数</span>
            <strong class="state-value">未確認</strong>
          </div>
        </section>

        <section class="process-log" aria-label="処理状態">
          <div class="process-log-title">処理状態</div>
          <ol id="processLog"></ol>
        </section>

        <div class="transcript" id="transcript" aria-live="polite"></div>
      </section>
    </main>
    <script src="/static/app.js?v=20260610-processing-log" type="module"></script>
  </body>
</html>
